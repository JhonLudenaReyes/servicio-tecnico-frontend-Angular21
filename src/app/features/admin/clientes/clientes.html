<div class="card bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Gestión de Clientes</h2>
      <p class="text-slate-500 mt-1">Administra los clientes registrados en el sistema.</p>
    </div>

    <button
      pButton
      label="Nuevo Cliente"
      icon="pi pi-plus"
      class="p-button-primary rounded-xl px-6 py-3 shadow-md transition-all hover:scale-105"
      (click)="showDialog()"
    ></button>
  </div>

  <app-cliente-table
    [clientes]="clientes()"
    [loading]="loading()"
    (edit)="showDialog($event)"
    (delete)="confirmDelete($event)"
  ></app-cliente-table>
</div>

<app-cliente-dialog
  [visible]="displayModal()"
  [cliente]="selectedCliente()"
  [ciudades]="ciudades()"
  (visibleChange)="onDialogVisibilityChange($event)"
  (save)="saveCliente($event)"
  (cancel)="onDialogCancel()"
></app-cliente-dialog>

<!-- Notificaciones y Confirmaciones -->
<p-toast position="top-right"></p-toast>
<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
