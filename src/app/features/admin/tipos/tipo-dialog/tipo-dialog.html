<p-dialog
  [header]="isEditMode ? 'Editar Tipo de Equipo' : 'Nuevo Tipo de Equipo'"
  [(visible)]="visible"
  [modal]="true"
  [style]="{ width: '450px' }"
  [draggable]="false"
  [resizable]="false"
  styleClass="custom-dialog"
  (onHide)="closeDialog()"
>
  <form [formGroup]="tipoForm" (ngSubmit)="submit()" class="flex flex-col gap-6 mt-4">
    <div class="flex flex-col gap-2">
      <label for="tipo" class="font-semibold text-slate-700">Nombre del Tipo</label>
      <input
        id="tipo"
        type="text"
        pInputText
        formControlName="tipo"
        class="w-full p-3 border-slate-200 rounded-xl focus:ring-2 focus:ring-primary-400"
        placeholder="Ej. Laptop, Servidor, Impresora"
      />
      @if (tipoForm.get('tipo')?.touched && tipoForm.get('tipo')?.invalid) {
        <small class="text-red-500 font-medium ml-1">
          @if (tipoForm.get('tipo')?.errors?.['required']) {
            El nombre es obligatorio.
          }
          @if (tipoForm.get('tipo')?.errors?.['minlength']) {
            Debe tener al menos 3 caracteres.
          }
        </small>
      }
    </div>

    <div class="flex justify-end gap-3 mt-6">
      <button
        type="button"
        pButton
        label="Cancelar"
        icon="pi pi-times"
        class="p-button-text p-button-secondary rounded-xl px-6"
        (click)="closeDialog()"
      ></button>
      <button
        type="submit"
        pButton
        label="Guardar"
        icon="pi pi-check"
        class="p-button-primary rounded-xl px-8 shadow-md"
        [disabled]="tipoForm.invalid"
      ></button>
    </div>
  </form>
</p-dialog>
