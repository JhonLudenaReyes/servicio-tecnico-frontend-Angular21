<div class="mb-3 flex justify-start">
  <p-iconfield iconPosition="left">
    <p-inputicon><lucide-angular [img]="Search" class="w-5 h-5"></lucide-angular></p-inputicon>
    <input
      pInputText
      pSize="small"
      type="text"
      (input)="dt.filterGlobal($any($event.target).value, 'contains')"
      placeholder="Buscar tipo..."
    />
  </p-iconfield>
</div>

<p-table
  #dt
  [value]="tipos"
  [loading]="loading"
  [rows]="6"
  [paginator]="true"
  [responsiveLayout]="'scroll'"
  styleClass="p-datatable-sm custom-table"
  [globalFilterFields]="['tipo', 'idTipo']"
>
  <ng-template pTemplate="header">
    <tr class="bg-slate-50">
      <th class="px-6 py-4 text-slate-600 font-semibold uppercase text-xs">ID</th>
      <th class="px-6 py-4 text-slate-600 font-semibold uppercase text-xs">Tipo de Equipo</th>
      <th class="px-6 py-4 text-slate-600 font-semibold uppercase text-xs text-center">Acciones</th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-tipo>
    <tr class="hover:bg-slate-50 transition-colors">
      <td class="px-6 py-4 font-medium text-slate-700">{{ tipo.idTipo }}</td>
      <td class="px-6 py-4 text-slate-600">{{ tipo.tipo }}</td>
      <td class="px-6 py-4 text-center">
        <div class="flex justify-center gap-2">
          <button
            pButton
            icon="pi pi-pencil"
            class="p-button-rounded p-button-text p-button-warning hover:bg-amber-50"
            (click)="onEdit(tipo)"
            pTooltip="Editar"
          ></button>
          <button
            pButton
            icon="pi pi-trash"
            class="p-button-rounded p-button-text p-button-danger hover:bg-red-50"
            (click)="onDelete(tipo)"
            pTooltip="Eliminar"
          ></button>
        </div>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="4" class="text-center py-8 text-slate-400">
        No se encontraron tipos de equipos registrados.
      </td>
    </tr>
  </ng-template>
</p-table>
