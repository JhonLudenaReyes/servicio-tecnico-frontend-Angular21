<div class="card bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Gestión de Tipos de Equipos</h2>
      <p class="text-slate-500 mt-1">
        Administra las categorías de dispositivos que recibe el servicio técnico.
      </p>
    </div>
    <button
      pButton
      label="Nuevo Tipo"
      icon="pi pi-plus"
      class="p-button-primary rounded-xl px-6 py-3 shadow-md transition-all hover:scale-105"
      (click)="showDialog()"
    ></button>
  </div>

  <app-tipo-table
    [tipos]="tipos()"
    [loading]="loading()"
    (edit)="showDialog($event)"
    (delete)="confirmDelete($event)"
  ></app-tipo-table>
</div>

<app-tipo-dialog
  [visible]="displayModal()"
  [tipo]="selectedTipo()"
  (visibleChange)="onDialogVisibilityChange($event)"
  (save)="saveTipo($event)"
  (cancel)="onDialogCancel()"
></app-tipo-dialog>

<p-toast position="top-right"></p-toast>
<p-confirmDialog [style]="{ width: '450px' }"></p-confirmDialog>
