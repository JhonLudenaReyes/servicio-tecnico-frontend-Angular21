<div class="card bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
  <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
    <div>
      <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Gestión de Equipos</h2>
      <p class="text-slate-500 mt-1">
        Administra el inventario de dispositivos y sus especificaciones técnicas.
      </p>
    </div>
    <button
      pButton
      label="Nuevo Equipo"
      icon="pi pi-plus"
      class="p-button-primary rounded-xl px-6 py-3 shadow-md transition-all hover:scale-105"
      (click)="showDialog()"
    ></button>
  </div>

  <app-equipo-table
    [equipos]="equipos()"
    [loading]="loading()"
    (edit)="showDialog($event)"
    (delete)="confirmDelete($event)"
  ></app-equipo-table>
</div>

<app-equipo-dialog
  [visible]="displayModal()"
  [equipo]="selectedEquipo()"
  [tipos]="tipos()"
  (visibleChange)="onDialogVisibilityChange($event)"
  (save)="saveEquipo($event)"
  (cancel)="onDialogCancel()"
></app-equipo-dialog>

<!-- Notificaciones y Confirmaciones -->
<p-toast position="top-right"></p-toast>
<p-confirmDialog [style]="{ width: '700px' }"></p-confirmDialog>
