<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
  <!-- Welcome Card -->
  <div class="col-span-full bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
    <h2 class="text-3xl font-bold text-slate-800">¡Bienvenido al Sistema de Gestión!</h2>
    <p class="text-slate-500 mt-2">Aquí tienes un resumen de la actividad de hoy en el taller técnico.</p>
  </div>

  <!-- Stats Cards -->
  @for (stat of stats; track stat.label) {
    <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-primary-300 transition-all cursor-pointer group">
      <div class="flex items-center justify-between">
        <div>
          <p class="text-sm font-medium text-slate-500">{{ stat.label }}</p>
          <p class="text-2xl font-bold text-slate-800 mt-1">{{ stat.value }}</p>
        </div>
        <div [class]="stat.bgClass + ' p-3 rounded-xl group-hover:scale-110 transition-transform'">
          <div [class]="stat.iconClass + ' w-6 h-6'"></div>
        </div>
      </div>
      <div class="mt-4 flex items-center text-sm">
        <span [class]="stat.trend > 0 ? 'text-emerald-600' : 'text-slate-400'" class="font-medium">
          @if (stat.trend > 0) { + }{{ stat.trend }}%
        </span>
        <span class="text-slate-400 ml-2">desde ayer</span>
      </div>
    </div>
  }
</div>
