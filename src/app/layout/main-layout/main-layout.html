<div class="flex h-screen bg-slate-50 overflow-hidden">
  <!-- Sidebar para escritorio -->
  <aside [class.w-64]="isSidebarOpen" [class.w-20]="!isSidebarOpen"
    class="hidden md:flex flex-col bg-technical-dark text-white transition-all duration-300 ease-in-out shadow-xl">

    <!-- Logo Area -->
    <div class="flex items-center h-16 px-6 bg-slate-900/50">
      <lucide-angular [img]="HardDrive" class="text-primary-400 w-8 h-8"></lucide-angular>
      @if (isSidebarOpen) {
        <span class="ml-3 font-bold text-lg tracking-tight whitespace-nowrap">
          TechService <span class="text-primary-400">Pro</span>
        </span>
      }
    </div>

    <!-- Navigation Links -->
    <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
      @for (item of menuItems; track item.path) {
        <a [routerLink]="item.path"
          routerLinkActive="bg-primary-600 text-white"
          [routerLinkActiveOptions]="{exact: true}"
          class="flex items-center px-4 py-3 rounded-lg text-slate-300 hover:bg-slate-800 hover:text-white transition-colors group">
          <lucide-angular [img]="item.icon" class="w-5 h-5"></lucide-angular>
          @if (isSidebarOpen) {
            <span class="ml-4 font-medium">{{ item.label }}</span>
          }
        </a>
      }
    </nav>

    <!-- Sidebar Toggle Button -->
    <div class="p-4 border-t border-slate-800">
      <button (click)="toggleSidebar()"
        class="w-full flex items-center px-4 py-3 rounded-lg text-slate-400 hover:bg-slate-800 hover:text-white transition-colors">
        <lucide-angular [img]="isSidebarOpen ? X : Menu" class="w-5 h-5"></lucide-angular>
        @if (isSidebarOpen) {
          <span class="ml-4 font-medium">Colapsar</span>
        }
      </button>
    </div>
  </aside>

  <!-- Main Content Area -->
  <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <!-- Topbar -->
    <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 shadow-sm">
      <h1 class="text-xl font-semibold text-slate-800">Panel de Control</h1>

      <div class="flex items-center space-x-4">
        <div class="flex flex-col text-right hidden sm:flex">
          <span class="text-sm font-semibold text-slate-700">Admin User</span>
          <span class="text-xs text-primary-600 font-medium">Super Administrador</span>
        </div>
        <div class="w-10 h-10 rounded-full bg-primary-100 flex items-center justify-center text-primary-700 font-bold border-2 border-primary-200">
          AD
        </div>
      </div>
    </header>

    <!-- Dynamic Content -->
    <main class="flex-1 overflow-y-auto p-8">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
